name: daily-branch-build

# Triggers on push to any `daily/*` branch (the research routine pushes these).
# Pipeline:
#   1. Generate hero images (Gemini "Nano Banana Pro") for any brief missing `image:` frontmatter
#   2. Generate day's TTS MP3 + metadata (Google Cloud TTS Chirp 3 HD)
#   3. Rebuild audio/index.json
#   4. Commit everything back to the same branch
#   5. Open/update a PR to main
#   6. Send Telegram preview (message + MP3 + PR link)
#
# After Yoh listens and merges the PR, the site picks up changes from main
# within the 5-min ISR revalidation window.

on:
  push:
    branches:
      - "daily/*"

permissions:
  contents: write       # commit images/audio/index back to the branch
  pull-requests: write  # open/update the PR

concurrency:
  group: daily-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          # Push commits using GITHUB_TOKEN so they trigger subsequent workflows as needed
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract timestamp slug from branch name
        id: slug
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SLUG="${BRANCH#daily/}"
          if [[ ! "$SLUG" =~ ^[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{4}$ ]]; then
            echo "::error::branch '$BRANCH' ไม่ใช่ format daily/YY-MM-DD-HHMM"
            exit 1
          fi
          YY="${SLUG:0:2}"; MM="${SLUG:3:2}"; DD="${SLUG:6:2}"
          HH="${SLUG:9:2}"; MI="${SLUG:11:2}"
          TITLE_DATE="20${YY}-${MM}-${DD} ${HH}:${MI}"
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title_date=$TITLE_DATE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG · title_date=$TITLE_DATE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install google-genai google-cloud-texttospeech python-dotenv requests "httpx[socks]"

      - name: Configure git identity
        run: |
          git config user.name  "enabridge-bot"
          git config user.email "bot@enabridge.ai"

      - name: Generate hero images (Gemini Nano Banana Pro)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 scripts/gen_images.py --slug "${{ steps.slug.outputs.slug }}"

      - name: Generate TTS (Google Cloud Chirp 3 HD)
        env:
          GCP_TTS_SA_JSON: ${{ secrets.GCP_TTS_SA_JSON }}
        run: |
          # Decode base64-encoded service-account JSON to a temp file and
          # point Google client libraries at it via ADC env var.
          SA_PATH="$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$GCP_TTS_SA_JSON" | base64 -d > "$SA_PATH"
          export GOOGLE_APPLICATION_CREDENTIALS="$SA_PATH"
          python3 scripts/tts.py --slug "${{ steps.slug.outputs.slug }}"
          rm -f "$SA_PATH"

      - name: Rebuild audio/index.json
        run: |
          python3 scripts/update_index.py

      - name: Commit generated artifacts
        run: |
          # Re-run failed jobs จะ checkout SHA เดิมตอน trigger — ถ้า remote มี
          # bot commit ค้างอยู่ (artifacts ของ run ก่อน) push จะ non-fast-forward
          # แก้ด้วยการ reset soft ไปที่ remote HEAD + push --force-with-lease
          BRANCH="${GITHUB_REF#refs/heads/}"
          git fetch origin "$BRANCH"
          git reset --soft "origin/$BRANCH" 2>/dev/null || true

          git add news/images/ audio/ news/
          if git diff --cached --quiet; then
            echo "ไม่มีไฟล์ใหม่ให้ commit"
          else
            git commit -m "build: images + audio + index for ${{ steps.slug.outputs.slug }}"
            git push --force-with-lease origin "HEAD:$BRANCH"
          fi

      - name: Open or update PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SLUG="${{ steps.slug.outputs.slug }}"
          TITLE_DATE="${{ steps.slug.outputs.title_date }}"
          TITLE="Daily AI Brief — ${TITLE_DATE}"

          INDEX_MD="news/${SLUG}-index.md"
          BODY_FILE="$(mktemp)"
          {
            echo "## Preview"
            echo ""
            echo "- 📻 **Audio**: \`audio/${SLUG}.mp3\` (ส่งเข้า Telegram แล้ว)"
            echo "- 🖼️ **Images**: \`news/images/${SLUG}-*.png\`"
            echo "- 📝 **Briefs**:"
            for f in news/${SLUG}-*.md; do
              [[ "$f" == *-index.md ]] && continue
              TITLE_LINE=$(grep -m1 '^# ' "$f" | sed 's/^# //')
              echo "    - \`$(basename "$f")\` — $TITLE_LINE"
            done
            echo ""
            echo "---"
            if [ -f "$INDEX_MD" ]; then
              cat "$INDEX_MD"
            fi
            echo ""
            echo "---"
            echo "_Merge to publish. Site + podcast feed updates within ~5 min._"
          } > "$BODY_FILE"

          # ถ้ามี PR อยู่แล้ว → update; ถ้ายังไม่มี → create
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING" ]; then
            echo "updating existing PR #$EXISTING"
            gh pr edit "$EXISTING" --title "$TITLE" --body-file "$BODY_FILE"
            PR_URL=$(gh pr view "$EXISTING" --json url --jq .url)
          else
            echo "creating new PR"
            PR_URL=$(gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file "$BODY_FILE")
          fi
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "PR: $PR_URL"

      - name: Send Telegram preview
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 scripts/push_telegram.py \
            --slug "${{ steps.slug.outputs.slug }}" \
            --pr-url "${{ steps.pr.outputs.pr_url }}"
